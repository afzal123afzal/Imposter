<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPOSTER GAME | Tactical Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9945FF;
            --neon-cyan: #14F195;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #05050a;
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 20, 45, 0.96) 0%, rgba(5, 5, 10, 1) 100%),
                url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .space-header {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-bright {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .neon-glow-purple {
            box-shadow: 0 0 30px rgba(153, 69, 255, 0.1);
        }

        .neon-glow-cyan {
            box-shadow: 0 0 30px rgba(20, 241, 149, 0.1);
        }

        .input-glow-purple:focus {
            border-color: #9945FF;
            box-shadow: 0 0 20px rgba(153, 69, 255, 0.2);
        }

        .input-glow-emerald:focus {
            border-color: #14F195;
            box-shadow: 0 0 20px rgba(20, 241, 149, 0.2);
        }

        [x-cloak] {
            display: none !important;
        }

        .timer-bar {
            height: 3px;
            background: linear-gradient(to right, #9945FF, #14F195);
            transition: width 1s linear;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .btn-premium {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        .btn-premium:active {
            transform: translateY(0);
            scale: 0.98;
        }

        .shadow-red-glow {
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.25);
        }

        .toast-active {
            transform: translateY(0);
            opacity: 1;
        }

        @keyframes winner-glimmer {
            0% {
                box-shadow: 0 0 0 rgba(234, 179, 8, 0);
            }

            50% {
                box-shadow: 0 0 30px rgba(234, 179, 8, 0.4);
            }

            100% {
                box-shadow: 0 0 0 rgba(234, 179, 8, 0);
            }
        }

        @keyframes imposter-flicker {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 0 40px rgba(239, 68, 68, 0.6);
                transform: scale(1.02);
            }

            70% {
                transform: translateX(2px);
            }

            80% {
                transform: translateX(-2px);
            }
        }

        @keyframes header-punch {
            0% {
                transform: scale(0.5);
                opacity: 0;
                filter: blur(10px);
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
                filter: blur(0);
            }

            100% {
                transform: scale(1);
            }
        }

        .animate-winner {
            animation: winner-glimmer 2s infinite ease-in-out;
        }

        .animate-imposter {
            animation: imposter-flicker 1.5s infinite ease-in-out;
        }

        .animate-header-reveal {
            animation: header-punch 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes turn-pulse-glow {

            0%,
            100% {
                border-color: rgba(99, 102, 241, 0.2);
                box-shadow: 0 0 10px rgba(99, 102, 241, 0.1);
            }

            50% {
                border-color: rgba(99, 102, 241, 0.6);
                box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            }
        }

        .animate-turn-glow {
            animation: turn-pulse-glow 2s infinite ease-in-out;
        }

        @keyframes crown-float {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-5px) rotate(5deg);
            }
        }

        .animate-crown {
            animation: crown-float 3s infinite ease-in-out;
        }

        .gold-glow {
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.3);
            border-color: rgba(234, 179, 8, 0.5) !important;
        }

        @keyframes silver-shimmer {

            0%,
            100% {
                border-color: rgba(148, 163, 184, 0.4);
                box-shadow: 0 0 10px rgba(148, 163, 184, 0.1);
            }

            50% {
                border-color: rgba(148, 163, 184, 0.8);
                box-shadow: 0 0 20px rgba(148, 163, 184, 0.3);
            }
        }

        .animate-silver {
            animation: silver-shimmer 3s infinite ease-in-out;
        }

        @keyframes bronze-shimmer {

            0%,
            100% {
                border-color: rgba(180, 83, 9, 0.4);
                box-shadow: 0 0 10px rgba(180, 83, 9, 0.1);
            }

            50% {
                border-color: rgba(180, 83, 9, 0.8);
                box-shadow: 0 0 20px rgba(180, 83, 9, 0.3);
            }
        }

        .animate-bronze {
            animation: bronze-shimmer 3s infinite ease-in-out;
        }

        .silver-glow {
            border-color: rgba(148, 163, 184, 0.4) !important;
        }

        .bronze-glow {
            border-color: rgba(180, 83, 9, 0.4) !important;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .animate-progress {
            animation: progress 5s linear forwards;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 selection:bg-purple-500/30">

    <div x-data="protocolApp()" x-init="initHub()" x-cloak class="w-full max-w-5xl relative z-10">

        <!-- STEP: LANDING -->
        <template x-if="step === 'landing'">
            <div class="animate-in fade-in zoom-in duration-500">
                <div class="text-center mb-10">
                    <h1
                        class="space-header text-4xl md:text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-500 via-indigo-400 to-emerald-400 leading-none py-1">
                        IMPOSTER GAME !!!</h1>
                    <p
                        class="text-[10px] font-black uppercase tracking-[0.8em] text-slate-600 mt-2 opacity-80 leading-none italic">
                        Synchronized Neural Frequency Hub</p>
                </div>

                <div class="max-w-md mx-auto mb-10 group relative">
                    <input type="text" x-model="playerName" placeholder="Agent Name Please"
                        class="w-full glass-bright p-5 md:p-6 rounded-2xl md:rounded-3xl text-center font-black focus:ring-1 focus:ring-purple-500 outline-none uppercase tracking-widest placeholder:text-slate-800 text-lg md:text-xl input-glow-purple transition-all shadow-inner">
                    <div
                        class="absolute -top-3 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-purple-600 text-[9px] font-bold uppercase tracking-widest rounded-lg text-white shadow-xl z-20">
                        Your Name Please</div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
                    <div
                        class="glass p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border-white/5 flex flex-col justify-between neon-glow-purple group transition-all hover:bg-white/5 relative overflow-hidden">
                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-600/10 blur-3xl rounded-full"></div>
                        <div class="mb-10 text-center relative z-10">
                            <p
                                class="text-[9px] text-purple-400 font-black uppercase tracking-[0.5em] mb-3 opacity-80 italic">
                                Command Authorization</p>
                            <h2
                                class="text-3xl md:text-4xl font-black text-white uppercase tracking-tighter leading-none">
                                INITIALIZE HOST</h2>
                            <p
                                class="mt-4 text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] leading-relaxed max-w-[200px] mx-auto">
                                Create a secure frequency hub for deployment.</p>
                        </div>
                        <div class="mb-8 relative z-10 px-6">
                            <p class="text-[9px] text-slate-600 font-black uppercase tracking-widest mb-3 text-center">
                                Hub Capacity (Max Agents)</p>
                            <div class="flex items-center justify-center space-x-6">
                                <button @click="maxPlayers = Math.max(3, maxPlayers - 1)"
                                    class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-white/5 border border-white/10 text-white font-black flex items-center justify-center hover:bg-white/10 transition-all">-</button>
                                <span
                                    class="text-2xl md:text-3xl font-black text-purple-500 w-12 md:w-16 text-center tabular-nums"
                                    x-text="maxPlayers"></span>
                                <button @click="maxPlayers = Math.min(50, maxPlayers + 1)"
                                    class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-white/5 border border-white/10 text-white font-black flex items-center justify-center hover:bg-white/10 transition-all">+</button>
                            </div>
                        </div>
                        <button @click="createRoom()" :disabled="!playerName || joinCode || signaling"
                            class="btn-premium w-full bg-gradient-to-br from-purple-600 to-indigo-800 p-5 md:p-7 rounded-2xl md:rounded-3xl text-white font-black uppercase tracking-[0.3em] md:tracking-[0.5em] shadow-2xl disabled:opacity-20 text-sm md:text-base">
                            <span x-text="signaling ? 'SYNCING...' : 'DEPLOY HUB'"></span>
                        </button>
                    </div>
                    <div
                        class="glass p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border-white/5 flex flex-col justify-between neon-glow-cyan border-emerald-500/10 group transition-all hover:bg-white/5 relative overflow-hidden">
                        <div class="absolute -top-10 -left-10 w-32 h-32 bg-emerald-600/10 blur-3xl rounded-full"></div>
                        <div class="mb-10 text-center relative z-10">
                            <p
                                class="text-[9px] text-emerald-400 font-black uppercase tracking-[0.5em] mb-3 opacity-80 italic">
                                Signal Bridge Reception</p>
                            <h2
                                class="text-3xl md:text-4xl font-black text-white uppercase tracking-tighter leading-none">
                                CONNECT
                                BRIDGE</h2>
                            <p
                                class="mt-4 text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] leading-relaxed max-w-[200px] mx-auto">
                                Input the 4-Letter Mission ID to join.</p>
                        </div>
                        <div class="space-y-4">
                            <div class="relative">
                                <input type="text" x-model="joinCode" placeholder="MISSION ID"
                                    class="w-full bg-black/50 border border-white/5 p-5 rounded-2xl text-center font-black focus:ring-1 focus:ring-emerald-500 outline-none uppercase tracking-[0.5em] placeholder:text-slate-900 text-lg input-glow-emerald transition-all shadow-inner">
                                <template x-if="urlRoomMatched">
                                    <div
                                        class="absolute -top-2 left-1/2 -translate-x-1/2 px-3 py-1 bg-emerald-600 text-[7px] font-black uppercase tracking-widest rounded text-white shadow-xl animate-bounce">
                                        SIGNAL DETECTED</div>
                                </template>
                            </div>
                            <button @click="joinRoom()" :disabled="!playerName || !joinCode || signaling"
                                class="btn-premium w-full p-6 bg-emerald-600/10 hover:bg-emerald-600/20 border border-emerald-500/30 rounded-2xl text-emerald-400 font-black uppercase tracking-[0.5em] disabled:opacity-5 text-sm">
                                ESTABLISH BRIDGE
                            </button>
                        </div>
                    </div>
                </div>

                <div x-show="status !== 'offline'"
                    class="mt-14 flex items-center justify-center space-x-3 px-6 py-2 glass rounded-full w-max mx-auto border-white/5 shadow-xl">
                    <div class="w-2 h-2 rounded-full"
                        :class="status === 'online' ? 'bg-emerald-500 shadow-[0_0_10px_#14f195]' : (status === 'error' ? 'bg-red-500' : 'bg-slate-700 animate-pulse')">
                    </div>
                    <span class="text-[8px] font-black uppercase tracking-[0.4em] text-slate-700"
                        x-text="'Satellite Status: ' + status.toUpperCase()"></span>
                </div>
            </div>
        </template>

        <!-- STEP: LOBBY -->
        <template x-if="step === 'lobby'">
            <div
                class="glass p-5 md:p-8 rounded-[2rem] md:rounded-[3rem] animate-in slide-in-from-bottom-5 duration-500 shadow-2xl relative overflow-hidden">
                <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-6">
                    <div>
                        <h2
                            class="space-header text-2xl md:text-3xl font-black text-white leading-none uppercase tracking-tighter">
                            TACTICAL HUB</h2>
                        <p
                            class="text-[9px] text-indigo-400 font-black uppercase tracking-[0.3em] mt-2 opacity-70 italic">
                            Operative Fleet Synched</p>
                    </div>
                    <div class="flex flex-col items-end space-y-3">
                        <div
                            class="bg-black/30 p-4 rounded-[1.5rem] text-center shadow-inner border border-white/5 min-w-[120px]">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1 tracking-widest leading-none">
                                ID CODE</p>
                            <p class="text-2xl md:text-3xl font-black text-white tracking-[0.2em] leading-none"
                                x-text="roomID"></p>
                        </div>
                        <button @click="copyLink()"
                            class="btn-premium px-6 py-2 bg-indigo-500/10 border border-indigo-500/30 rounded-full text-[8px] font-black uppercase tracking-widest text-indigo-400 hover:bg-indigo-500/20">
                            🔗 Copy Mission Link
                        </button>
                    </div>
                </div>

                <!-- HOST CONFIGURATION -->
                <template x-if="isHost">
                    <div
                        class="mb-8 p-4 md:p-6 glass-bright border border-white/5 rounded-[1.5rem] md:rounded-[2rem] flex flex-col md:flex-row items-center justify-between space-y-4 md:space-y-0">
                        <div>
                            <p
                                class="text-[9px] text-indigo-400 font-black uppercase tracking-[0.3em] mb-1 opacity-70 italic">
                                Protocol Adjustment</p>
                            <h3 class="text-sm font-black text-white uppercase tracking-wider">Imposter Threat Level
                            </h3>
                        </div>
                        <div
                            class="flex items-center space-x-4 bg-black/20 p-2 rounded-2xl border border-white/5 shadow-inner">
                            <button
                                @click="manualImposterLimit = Math.max(0, manualImposterLimit - 1); broadcastConfig()"
                                class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 text-white font-black flex items-center justify-center hover:bg-white/10">-</button>
                            <div class="text-center px-4">
                                <span class="text-xl font-black text-white leading-none block"
                                    x-text="manualImposterLimit === 0 ? 'AUTO' : manualImposterLimit"></span>
                                <p class="text-[7px] text-slate-500 font-bold uppercase tracking-widest mt-0.5"
                                    x-text="manualImposterLimit === 0 ? 'SCALING' : 'FIXED'"></p>
                            </div>
                            <button
                                @click="manualImposterLimit = Math.min(5, manualImposterLimit + 1); broadcastConfig()"
                                class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 text-white font-black flex items-center justify-center hover:bg-white/10">+</button>
                        </div>
                    </div>
                </template>
                <template x-if="!isHost">
                    <div
                        class="mb-8 p-4 glass-bright border border-white/5 rounded-[1.5rem] flex items-center justify-center space-x-3 opacity-80">
                        <div class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></div>
                        <p class="text-[9px] text-slate-500 font-black uppercase tracking-[0.4em]">Threat Level: <span
                                class="text-indigo-400 ml-1"
                                x-text="manualImposterLimit === 0 ? 'AUTO SCALING' : manualImposterLimit + ' FIXED IMPOSTERS'"></span>
                        </p>
                    </div>
                </template>

                <div
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-max overflow-y-auto mb-10 pr-2 custom-scrollbar max-h-[45vh]">
                    <template x-for="p in players" :key="p.peerID">
                        <div
                            class="p-4 glass-bright border-white/5 rounded-2xl flex items-center justify-between group transition-all">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-800 flex items-center justify-center text-[10px] font-black text-white shadow-lg uppercase"
                                    x-text="p.name[0]"></div>
                                <div>
                                    <p class="font-black text-white text-xs uppercase truncate max-w-[80px]"
                                        x-text="p.name"></p>
                                    <p class="text-[7px] text-slate-600 font-black uppercase tracking-widest mt-0.5 opacity-70"
                                        x-text="p.peerID === myPeerID ? 'UNIT: SELF' : 'UNIT: AGENT'"></p>
                                </div>
                            </div>
                            <template x-if="isHost && p.peerID !== myPeerID">
                                <button @click="kickPlayer(p.peerID)"
                                    class="w-6 h-6 bg-red-600/10 text-red-500 border border-red-500/20 rounded-lg hover:bg-red-600 hover:text-white transition-all flex items-center justify-center text-[10px] font-black">×</button>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- LOBBY CHAT -->
                <div class="mb-10 pt-6 border-t border-white/5">
                    <p class="text-[9px] text-indigo-400 font-black uppercase tracking-[0.4em] mb-4 opacity-70 italic">
                        Hub Frequency Comms</p>
                    <div class="h-40 glass-bright rounded-[1.5rem] p-5 overflow-y-auto custom-scrollbar space-y-3 mb-4"
                        x-ref="lobbyChat"
                        x-init="$watch('messages', () => { $nextTick(() => { $refs.lobbyChat.scrollTop = $refs.lobbyChat.scrollHeight; }) })">
                        <template x-for="msg in messages">
                            <div class="animate-in slide-in-from-left-1">
                                <div class="flex items-baseline space-x-2">
                                    <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest"
                                        x-text="msg.name"></span>
                                    <span class="text-[7px] text-slate-700 font-bold" x-text="msg.time"></span>
                                </div>
                                <p class="text-[11px] font-bold text-white/90 uppercase tracking-wide leading-tight mt-0.5"
                                    x-text="msg.text"></p>
                            </div>
                        </template>
                        <template x-if="messages.length === 0">
                            <div class="h-full flex items-center justify-center opacity-20">
                                <p class="text-[8px] text-slate-500 font-black uppercase tracking-[0.5em] italic">Secure
                                    Line Established...</p>
                            </div>
                        </template>
                    </div>
                    <div class="flex space-x-3">
                        <input type="text" x-model="chatInput" @keydown.enter="sendChatMessage()"
                            placeholder="Enter secure transmission..."
                            class="flex-1 glass-bright p-4 rounded-2xl text-[10px] font-black focus:ring-1 focus:ring-indigo-500 outline-none uppercase tracking-widest placeholder:text-slate-800 text-white shadow-inner">
                        <button @click="sendChatMessage()"
                            class="px-6 bg-indigo-600/10 text-indigo-400 border border-indigo-500/30 rounded-2xl text-[9px] font-black uppercase tracking-[0.3em] hover:bg-indigo-600 hover:text-white transition-all shadow-lg active:scale-95">SEND</button>
                    </div>
                </div>

                <template x-if="isHost">
                    <button @click="hostStartGame()" :disabled="players.length < 3"
                        class="btn-premium w-full bg-gradient-to-r from-purple-600 via-indigo-600 to-indigo-800 py-6 rounded-[2rem] text-white font-black uppercase tracking-[0.5em] shadow-xl disabled:opacity-20 text-base">
                        Deploy Final Protocol
                    </button>
                </template>
                <template x-if="!isHost">
                    <div class="text-center p-10 bg-white/5 rounded-[2.5rem] border border-white/5 animate-pulse">
                        <p
                            class="text-indigo-400 font-black text-[10px] uppercase tracking-[0.5em] italic opacity-80 leading-none">
                            Awaiting Deployment Auth Hub...</p>
                    </div>
                </template>
            </div>
        </template>

        <!-- STEP: REVEAL (RESTORED TACTICAL LOADER) -->
        <template x-if="step === 'reveal'">
            <div
                class="glass p-6 md:p-10 rounded-[2.5rem] md:rounded-[3.5rem] text-center shadow-2xl animate-in zoom-in duration-500 relative overflow-hidden">
                <div class="mb-8">
                    <p class="text-[10px] text-indigo-400 font-black uppercase tracking-[0.4em] mb-2 opacity-70">
                        Identity Authentication</p>
                    <h2 class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter leading-none"
                        x-text="playerName"></h2>
                </div>

                <div x-show="!readyToChat" class="max-w-md mx-auto">
                    <div class="w-full h-64 md:h-72 glass-bright border-2 border-dashed border-indigo-500/20 rounded-[2rem] md:rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer group hover:bg-white/5 transition-all relative overflow-hidden"
                        @click="wordVisible = true">
                        <div x-show="!wordVisible" class="text-center">
                            <div
                                class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-white/5 animate-pulse shadow-inner text-indigo-400">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                    </path>
                                </svg>
                            </div>
                            <p class="text-[10px] text-indigo-400 font-black uppercase tracking-[0.5em]">Authorize
                                Reveal</p>
                        </div>
                        <div x-show="wordVisible" class="animate-in slide-in-from-top-4 duration-500 text-center px-10">
                            <template x-if="myRole && myRole.isImposter">
                                <div class="mb-8">
                                    <span
                                        class="px-5 py-2 bg-red-600/20 border border-red-500 text-red-500 text-[10px] font-black uppercase tracking-[0.4em] rounded-full shadow-lg animate-pulse inline-block whitespace-nowrap">INFILTRATOR
                                        DETECTED</span>
                                    <p
                                        class="mt-4 text-white/50 text-[9px] font-black uppercase tracking-widest leading-none italic">
                                        Neutralize. Blend in.</p>
                                </div>
                            </template>
                            <template x-if="myRole && !myRole.isImposter">
                                <p

    <script>
        function protocolApp() {
            return {
                step: 'landing', roomID: '', peer: null, conn: null, connections: {},
                playerName: '', joinCode: '', isHost: false, players: [],
                status: 'offline', signaling: false, myRole: null, roles: [], clues: [], clueInput: '',
                activePlayerIndex: 0, activePlayerName: '', isMyTurn: false,

                readyToChat: false, readyPlayers: [],
                voteCounts: {}, winner: null, currentPair: [], myPeerID: '',
                toastActive: false, urlRoomMatched: false,
                isTransitioning: false,
                scores: JSON.parse(localStorage.getItem('undercover_scores') || '{}'),
                messages: [], chatInput: '', maxPlayers: 20, manualImposterLimit: 0,
                errorState: { active: false, title: '', message: '' },
                extensionVotes: { yes: 0, no: 0 }, hasVotedExtension: false,
                showArchive: false,
                wordPairs: [
                    ['Coffee', 'Tea'], ['Lion', 'Tiger'], ['Pizza', 'Burger'], ['Sun', 'Moon'], ['Laptop', 'Desktop'],
                    ['River', 'Mountain'], ['Sword', 'Shield'], ['Forest', 'Desert'], ['Paris', 'London'], ['Radio', 'Podcast'],

                    ['Actor', 'Director'], ['Doctor', 'Nurse'], ['Football', 'Rugby'], ['Movie', 'Series'], ['TikTok', 'Instagram'],
                    ['Mars', 'Venus'], ['Robot', 'AI'], ['Bitcoin', 'Ethereum'], ['Batman', 'Superman'], ['Marvel', 'DC'],
                    ['Safari', 'Chrome'], ['Linux', 'Windows'], ['Python', 'JavaScript'], ['Cat', 'Kitten'], ['Dog', 'Puppy'],
                    ['Bread', 'Cake'], ['Milk', 'Yogurt'], ['Diamond', 'Gold'], ['Silver', 'Platinum'], ['Hurricane', 'Tornado'],
                    ['Volcano', 'Geyser'], ['Whale', 'Dolphin'], ['Spider', 'Ant'], ['Beer', 'Wine'], ['Math', 'Science'],
                    ['Earth', 'Mars'], ['Black', 'White'], ['Red', 'Blue'], ['Rain', 'Snow'], ['Fire', 'Ice'],
                    ['Apple', 'Banana'], ['Car', 'Truck'], ['Ship', 'Boat'], ['Key', 'Lock'], ['Chair', 'Table'],
                    ['Sofa', 'Couch'], ['Guitar', 'Ukulele'], ['Pen', 'Pencil'], ['Watch', 'Clock'], ['Hammer', 'Wrench'],
                    ['Bridge', 'Tunnel'], ['Island', 'Peninsula'], ['Cake', 'Cookie'], ['Honey', 'Sugar'], ['Soap', 'Shampoo'],
                    ['Mirror', 'Glass'], ['Star', 'Planet'], ['Cloud', 'Fog'], ['Orange', 'Lemon'], ['Grape', 'Strawberry'],
                    ['Salt', 'Pepper'], ['Paper', 'Cardboard'], ['Hat', 'Cap'], ['Shirt', 'Jacket'], ['Shoes', 'Socks'],
                    ['Park', 'Garden'], ['School', 'College'], ['City', 'Village'], ['Market', 'Mall'], ['Bank', 'ATM'],
                    ['Ocean', 'Sea'], ['Lake', 'Pond'], ['Pool', 'River'], ['Grass', 'Leaf'], ['Flower', 'Bush'],
                    ['Elephant', 'Giraffe'], ['Zebra', 'Horse'], ['Cow', 'Sheep'], ['Pig', 'Goat'], ['Chicken', 'Duck'],
                    ['Snake', 'Lizard'], ['Frog', 'Toad'], ['Bee', 'Wasp'], ['Fly', 'Mosquito'], ['Butterfly', 'Moth'],
                    ['Book', 'Magazine'], ['Newspaper', 'Journal'], ['Letter', 'Email'], ['Call', 'Text'], ['Music', 'Podcast'],
                    ['Game', 'Sport'], ['Tennis', 'Badminton'], ['Golf', 'Hockey'], ['Swim', 'Dive'], ['Run', 'Jump'],
                    ['Circle', 'Square'], ['Triangle', 'Oval'], ['Line', 'Dot'], ['Blue', 'Purple'], ['Green', 'Yellow'],
                    // Malayalam Categories (Expanded)
                    ['Sadhya', 'Biryani'], ['Premam', 'Hridayam'], ['Drishyam', 'Memories'], ['Lucifer', 'Bheeshma Parvam'],
                    ['Mammootty', 'Mohanlal'], ['Mundu', 'Lungi'], ['Puttu', 'Appam'], ['Onam', 'Vishu'],
                    ['Kathakali', 'Mohiniyattam'], ['Kochi', 'Trivandrum'], ['Manichithrathazhu', 'Bhargavi Nilayam'],
                    ['Aavesham', 'Romancham'], ['Bangalore Days', 'Ustad Hotel'], ['Kumbalangi Nights', 'Maheshinte Prathikaram'],
                    ['Minnal Murali', 'Guru'], ['Manjummel Boys', '2018'],
                    ['Idiyappam', 'Palappam'], ['Puttu', 'Kadala Curry'], ['Appam', 'Stew'], ['Pathiri', 'Chicken Curry'],
                    ['Pazham Pori', 'Sukhiyan'], ['Neyyappam', 'Unniyappam'], ['Achappam', 'Kuzhalappam'], ['Boli', 'Palpayasam'],
                    ['Banana Chips', 'Sarkara Varatti'], ['Dasan', 'Vijayan'], ['Anjooran', 'Raghavan Nair'], ['Pavanayi', 'Major Nair'],
                    ['Shibu', 'Minnal Murali'], ['Georgekutty', 'IG Geetha'], ['Jayan', 'Prem Nazir'], ['Sukumaran', 'Soman'],
                    ['Jagathy', 'Innocent'], ['KPAC Lalitha', 'Sukumarayi'], ['Shobana', 'Urvashi'], ['Athirappilly', 'Vazhachal'],
                    ['Bekal Fort', 'Palakkad Fort'], ['Guruvayur', 'Sabarimala'], ['Silent Valley', 'Eravikulam'],
                    ['Kalaripayattu', 'Margamkali'], ['Oppana', 'Daffmuttu'], ['Chundan Vallam', 'Snake Boat'],
                    ['Kerala Blasters', 'Manjappada'], ['Asianet', 'Mazhavil'], ['Fahadh Faasil', 'Suraj Venjaramoodu'],
                    ['Tovino Thomas', 'Dulquer Salmaan'], ['Prithviraj', 'Indrajith'], ['Nivin Pauly', 'Asif Ali'],
                    ['Nazriya', 'Manju Warrier'], ['Kappa', 'Meen Mulakithu'], ['Puttu', 'Appam'], ['Sambar', 'Rasam']
                ],
                getPlayerColor(name) {
                    const colors = [
                        'bg-indigo-600', 'bg-emerald-600', 'bg-rose-600', 'bg-amber-600',
                        'bg-cyan-600', 'bg-fuchsia-600', 'bg-violet-600', 'bg-teal-600',
                        'bg-orange-600', 'bg-pink-600', 'bg-lime-600', 'bg-sky-600',
                        'bg-yellow-600', 'bg-purple-600', 'bg-slate-600', 'bg-red-600'
                    ];
                    let hash = 0;
                    for (let i = 0; i < name.length; i++) {
                        hash = ((hash << 5) - hash) + name.charCodeAt(i);
                        hash |= 0;
                    }
                    return colors[Math.abs(hash) % colors.length];
                },
                initHub() {
                    const params = new URLSearchParams(window.location.search);
                    if (params.has('room')) {
                        this.joinCode = params.get('room').toUpperCase();
                        this.urlRoomMatched = true;
                    }
                },
                copyLink() {
                    const url = window.location.origin + window.location.pathname + '?room=' + this.roomID;
                    navigator.clipboard.writeText(url).then(() => {
                        this.toastActive = true;
                        setTimeout(() => this.toastActive = false, 3000);
                    });
                },
                getSortedPlayers() {
                    return this.roles.slice().sort((a, b) => (this.scores[b.peerID] || 0) - (this.scores[a.peerID] || 0));
                },
                createRoom() {
                    this.signaling = true; this.status = 'connecting';
                    const code = Math.random().toString(36).substring(2, 6).toUpperCase();
                    this.roomID = code; this.isHost = true;
                    this.peer = new Peer('el-' + code, { debug: 1 });
                    this.peer.on('open', id => { this.status = 'online'; this.signaling = false; this.myPeerID = id; this.players = [{ name: this.playerName, peerID: id }]; this.step = 'lobby'; });
                    this.peer.on('connection', conn => {
                        this.connections[conn.peer] = conn;
                        conn.on('data', data => this.handleHostData(data, conn.peer));
                        conn.on('close', () => this.handleDisconnect(conn.peer));
                    });
                    this.peer.on('error', err => {
                        this.status = 'error';
                        this.signaling = false;
                        this.triggerError('FREQUENCY OVERLAP', 'ID Frequency overlap detected. Please refresh the Hub.');
                    });
                },
                joinRoom() {
                    this.signaling = true; this.status = 'connecting';
                    const code = this.joinCode.toUpperCase();
                    this.roomID = code; this.isHost = false;
                    this.peer = new Peer({ debug: 1 });
                    this.peer.on('open', id => {
                        this.myPeerID = id;
                        this.conn = this.peer.connect('el-' + code, { metadata: { name: this.playerName } });
                        this.conn.on('open', () => { this.status = 'online'; this.signaling = false; this.sendToHost({ type: 'join', name: this.playerName }); this.step = 'lobby'; });
                        this.conn.on('data', data => this.handleClientData(data));
                        this.conn.on('close', () => {
                            this.step = 'landing';
                            this.triggerError('SYNC LOST', 'Connection to the hub lead was terminated.');
                        });
                    });
                },
                sendChatMessage() {
                    if (!this.chatInput.trim()) return;
                    const data = { type: 'chat_message', name: this.playerName, text: this.chatInput.trim(), time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                    this.isHost ? this.handleHostData(data, this.myPeerID) : this.sendToHost(data);
                    this.chatInput = '';
                },
                handleHostData(data, fromID) {
                    if (data.type === 'join') {
                        if (this.players.length >= this.maxPlayers) {
                            const conn = this.connections[fromID];
                            if (conn) { conn.send({ type: 'error', message: 'Hub is at Full Capacity.' }); setTimeout(() => conn.close(), 500); }
                            return;
                        }
                        if (!this.players.find(p => p.peerID === fromID)) {
                            this.players.push({ name: data.name, peerID: fromID });
                            this.broadcast({ type: 'players_update', players: this.players });
                        }
                    }
                    if (data.type === 'chat_message') {
                        this.messages.push(data);
                        this.broadcast({ type: 'chat_broadcast', messages: this.messages });
                    }
                    if (data.type === 'broadcast_config') {
                        this.maxPlayers = data.maxPlayers;
                        this.manualImposterLimit = data.manualImposterLimit;
                        this.broadcast({ type: 'config_sync', maxPlayers: this.maxPlayers, manualImposterLimit: this.manualImposterLimit });
                    }
                    if (data.type === 'extension_vote_cast') {
                        data.vote ? this.extensionVotes.yes++ : this.extensionVotes.no++;
                        this.broadcast({ type: 'extension_vote_sync', votes: this.extensionVotes });
                    }
                    if (data.type === 'ready_check') {
                        if (!this.readyPlayers.includes(fromID)) {
                            this.readyPlayers.push(fromID);
                            if (this.readyPlayers.length >= this.players.length) setTimeout(() => this.hostInitializeTurns(), 500);
                        }
                    }
                    if (data.type === 'clue_entry') {
                        this.clues.push({ player: data.name, text: data.text, round: this.currentRound });
                        this.broadcast({ type: 'clue_broadcast', clues: this.clues });
                        this.hostRotateTurn();
                    }
                    if (data.type === 'vote_cast') {
                        this.voteCounts[data.targetID] = (this.voteCounts[data.targetID] || 0) + 1;
                        this.broadcast({ type: 'vote_sync', voteCounts: this.voteCounts });
                        if (Object.values(this.voteCounts).reduce((a, b) => a + b, 0) >= this.players.length) setTimeout(() => this.hostProcessResults(), 500);
                    }
                },
                handleClientData(data) {
                    if (data.type === 'players_update') this.players = data.players;
                    if (data.type === 'return_to_lobby') this.step = 'lobby';
                    if (data.type === 'error') {
                        this.peer.destroy();
                        this.step = 'landing';
                        this.triggerError('SIGNAL REFUSED', data.message);
                    }
                    if (data.type === 'kick') {
                        this.conn.close();
                        this.step = 'landing';
                        this.triggerError('MANUAL EXTRACTION', 'You have been removed from the frequency by the hub lead.');
                    }
                    if (data.type === 'chat_broadcast') this.messages = data.messages;
                    if (data.type === 'config_sync') {
                        this.maxPlayers = data.maxPlayers;
                        this.manualImposterLimit = data.manualImposterLimit;
                    }
                    if (data.type === 'extension_vote_start') {
                        this.isTransitioning = false;
                        this.step = 'extension_vote';
                        this.hasVotedExtension = false;
                        this.extensionVotes = { yes: 0, no: 0 };
                    }
                    if (data.type === 'extension_vote_sync') {
                        this.extensionVotes = data.votes;
                    }
                    if (data.type === 'round_transition') { this.isTransitioning = true; }
                    if (data.type === 'game_start') {
                        this.isTransitioning = false;
                        this.extensionVotes = { yes: 0, no: 0 };
                        this.hasVotedExtension = false;
                        this.roles = data.roles; this.myRole = this.roles.find(r => r.peerID === this.myPeerID); this.currentPair = data.pair;
                        this.wordVisible = false; this.readyToChat = false; this.clues = []; this.currentRound = 1; this.hasVoted = false; this.voteCounts = {};
                        this.step = 'reveal';
                    }
                    if (data.type === 'clue_broadcast') this.clues = data.clues;
                    if (data.type === 'turn_order') {
                        this.isTransitioning = false;
                        this.step = 'active'; this.activePlayerIndex = data.idx; this.currentRound = data.round;
                        this.activePlayerName = this.roles[this.activePlayerIndex].name;
                        this.isMyTurn = (this.roles[this.activePlayerIndex].peerID === this.myPeerID);
                        this.startTimer();
                    }
                    if (data.type === 'vote_init') { this.isTransitioning = false; this.step = 'vote'; this.hasVoted = false; this.voteCounts = {}; this.showArchive = false; }
                    if (data.type === 'vote_sync') { this.voteCounts = data.voteCounts; }
                    if (data.type === 'result') {
                        this.winner = data.winner; this.currentPair = data.pair; this.scores = data.scores;
                        localStorage.setItem('undercover_scores', JSON.stringify(this.scores));
                        this.step = 'result'; this.showArchive = false;
                    }
                },
                hostStartGame() {
                    const pair = this.wordPairs[Math.floor(Math.random() * this.wordPairs.length)];
                    this.currentPair = pair;
                    const gamePlayers = [...this.players];
                    this.shuffle(gamePlayers);

                    // Dynamic vs Manual Imposters
                    let imposterCount = gamePlayers.length >= 9 ? 3 : (gamePlayers.length >= 6 ? 2 : 1);
                    if (this.manualImposterLimit > 0) {
                        imposterCount = Math.min(this.manualImposterLimit, gamePlayers.length - 2);
                        if (imposterCount < 1) imposterCount = 1;
                    }

                    // Random Roles (Imposter can be anywhere)
                    const potentialImposters = [...gamePlayers];
                    this.shuffle(potentialImposters);
                    const imposterIDs = potentialImposters.slice(0, imposterCount).map(p => p.peerID);

                    // Map roles from the SHUFFLED list (gamePlayers) to randomize turn order
                    this.roles = gamePlayers.map(p => ({
                        peerID: p.peerID,
                        name: p.name,
                        word: imposterIDs.includes(p.peerID) ? pair[1] : pair[0],
                        isImposter: imposterIDs.includes(p.peerID)
                    }));
                    this.readyPlayers = []; this.voteCounts = {}; this.extensionVotes = { yes: 0, no: 0 }; this.hasVotedExtension = false;
                    this.broadcast({ type: 'game_start', roles: this.roles, pair: pair });
                    this.handleClientData({ type: 'game_start', roles: this.roles, pair: pair });
                },
                returnToLobby() { if (this.isHost) { this.broadcast({ type: 'return_to_lobby' }); this.step = 'lobby'; } },
                kickPlayer(peerID) {
                    if (this.isHost) {
                        const conn = this.connections[peerID];
                        if (conn) { conn.send({ type: 'kick' }); setTimeout(() => conn.close(), 500); }
                        this.players = this.players.filter(p => p.peerID !== peerID);
                        this.broadcast({ type: 'players_update', players: this.players });
                    }
                },
                handleDisconnect(peerID) {
                    this.players = this.players.filter(p => p.peerID !== peerID);
                    this.broadcast({ type: 'players_update', players: this.players });
                },
                markReady() {
                    this.readyToChat = true;
                    if (this.isHost) this.handleHostData({ type: 'ready_check' }, this.myPeerID);
                    else this.sendToHost({ type: 'ready_check' });
                },
                hostInitializeTurns() { this.activePlayerIndex = 0; this.currentRound = 1; this.broadcastTurnOrder(); },
                broadcastTurnOrder() {
                    const data = { type: 'turn_order', idx: this.activePlayerIndex, round: this.currentRound };
                    this.broadcast(data); this.handleClientData(data);
                },
                hostRotateTurn() {
                    this.activePlayerIndex++;
                    if (this.activePlayerIndex >= this.players.length) {
                        // Broadcast transition for all clients
                        const transitionData = { type: 'round_transition' };
                        this.broadcast(transitionData); this.handleClientData(transitionData);

                        // End of round: Delay 5 seconds for final review
                        setTimeout(() => {
                            this.activePlayerIndex = 0;
                            this.currentRound++;
                            if (this.currentRound === 3) {
                                this.step = 'extension_vote';
                                this.broadcast({ type: 'extension_vote_start' });
                                return;
                            }
                            if (this.currentRound > 3) {
                                this.broadcast({ type: 'vote_init' });
                                this.handleClientData({ type: 'vote_init' });
                                return;
                            }
                            this.broadcastTurnOrder();
                        }, 5000);
                        return;
                    }
                    this.broadcastTurnOrder();
                },
                submitExtensionVote(vote) {
                    this.hasVotedExtension = true;
                    const data = { type: 'extension_vote_cast', vote: vote };
                    this.isHost ? this.handleHostData(data, this.myPeerID) : this.sendToHost(data);
                },
                decideExtension(approved) {
                    if (approved) {
                        this.broadcastTurnOrder();
                    } else {
                        const data = { type: 'vote_init' };
                        this.broadcast(data);
                        this.handleClientData(data);
                    }
                },
                startTimer() {
                    clearInterval(this.timerInterval); this.timer = 15 + Math.floor(Math.random() * 20);
                    this.timer = 30;
                    if (this.isMyTurn) {
                        this.timerInterval = setInterval(() => {
                            this.timer--;
                            if (this.timer <= 0) { clearInterval(this.timerInterval); this.submitClue('INTELLIGENCE SYNC TIMEOUT'); }
                        }, 1000);
                    }
                },
                submitClue() {
                    if (!this.isMyTurn) return;
                    this.isMyTurn = false;
                    clearInterval(this.timerInterval);
                    const text = this.clueInput || 'RADIO SILENCE';
                    const data = { type: 'clue_entry', name: this.playerName, text: text };
                    this.isHost ? this.handleHostData(data, this.myPeerID) : this.sendToHost(data);
                    this.clueInput = '';
                },
                handleVoteClick(targetID) { this.hasVoted = true; const data = { type: 'vote_cast', targetID: targetID }; this.isHost ? this.handleHostData(data, this.myPeerID) : this.sendToHost(data); },
                hostProcessResults() {
                    const sorted = Object.entries(this.voteCounts).sort((a, b) => b[1] - a[1]);
                    const eliminatedID = sorted[0][0];
                    const player = this.roles.find(r => r.peerID === eliminatedID);
                    const winner = player && player.isImposter ? 'citizens' : 'infiltrator';
                    this.roles.forEach(r => {
                        const earnedTrue = (winner === 'citizens' && !r.isImposter) || (winner === 'infiltrator' && r.isImposter) ? 1 : 0;
                        this.scores[r.peerID] = (this.scores[r.peerID] || 0) + earnedTrue;
                    });
                    const finalData = { type: 'result', winner: winner, pair: this.currentPair, scores: this.scores };
                    this.broadcast(finalData); this.handleClientData(finalData);
                },
                sendToHost(data) { if (this.conn) this.conn.send(data); },
                triggerError(title, message) {
                    this.errorState = { active: true, title: title, message: message };
                },
                broadcastConfig() {
                    const data = { type: 'broadcast_config', maxPlayers: this.maxPlayers, manualImposterLimit: this.manualImposterLimit };
                    this.isHost ? this.handleHostData(data, this.myPeerID) : this.sendToHost(data);
                },
                broadcast(data) { Object.values(this.connections).forEach(c => c.send(data)); },
                shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } }
            }
        }
    </script>
